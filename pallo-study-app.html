<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Pallo 학습관리 | (주)팔로</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{
  --main:#02674F; --main-d:#014a39; --main-l:#e7f2ee;
  --bg:#F5F7F6; --card:#FFFFFF;
  --ok:#2E9D63; --warn:#F2B84B; --danger:#D94A4A; --info:#3C76D2; --off:#9DA6A1;
  --sleep:#8B6FD6; --text:#1b2320; --sub:#6b7570; --line:#E4E9E6;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--text);}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:#c7d0cc;border-radius:4px;}

#root{width:100%;min-height:100vh;}

/* ---------- LOGIN ---------- */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--main) 0%, #014438 60%, #012c25 100%);padding:24px;}
.login-card{width:100%;max-width:380px;background:var(--card);border-radius:20px;padding:36px 28px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.brand-mark{width:36px;height:36px;border-radius:10px;background:var(--main);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;}
.brand-name{font-weight:800;font-size:19px;letter-spacing:-.02em;}
.brand-sub{color:var(--sub);font-size:12.5px;margin-bottom:26px;}
.role-title{font-size:13px;color:var(--sub);margin:18px 0 10px;font-weight:600;}
.role-btn{width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--line);border-radius:14px;margin-bottom:10px;transition:.15s;text-align:left;}
.role-btn:hover{border-color:var(--main);background:var(--main-l);}
.role-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.role-name{font-weight:700;font-size:14.5px;}
.role-desc{font-size:11.5px;color:var(--sub);margin-top:1px;}
.login-foot{margin-top:20px;text-align:center;font-size:11px;color:#b9bfbb;}

/* ---------- APP SHELL ---------- */
.student-shell{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;}
.topbar{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-weight:800;font-size:16px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;}
.pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:99px;}
.content{flex:1;overflow-y:auto;padding:14px 16px 90px;}
.bottom-nav{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:20;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 10px;font-size:10.5px;color:var(--sub);font-weight:600;}
.nav-item.active{color:var(--main);}
.nav-ic{font-size:19px;}

/* ---------- CARDS / COMMON ---------- */
.card{background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--line);margin-bottom:12px;}
.card-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.muted{color:var(--sub);}
.small{font-size:11.5px;}
.hero-status{background:linear-gradient(135deg,var(--main),#014a39);border-radius:18px;padding:20px;color:#fff;margin-bottom:14px;}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hero-name{font-size:17px;font-weight:800;}
.hero-seat{font-size:12px;opacity:.85;margin-top:2px;}
.hero-badge{background:rgba(255,255,255,.18);padding:5px 11px;border-radius:99px;font-size:11.5px;font-weight:700;}
.hero-time{font-size:38px;font-weight:800;letter-spacing:-.02em;margin:14px 0 4px;font-variant-numeric:tabular-nums;}
.hero-goal-bar{height:7px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden;margin-top:8px;}
.hero-goal-fill{height:100%;background:#fff;border-radius:99px;}
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;}
.status-btn{aspect-ratio:1/.82;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-weight:700;font-size:12.5px;border:1.5px solid var(--line);background:var(--card);transition:.12s;}
.status-btn:active{transform:scale(.96);}
.status-btn.primary{grid-column:span 3;background:var(--main);color:#fff;border-color:var(--main);aspect-ratio:auto;padding:16px;font-size:15px;flex-direction:row;}
.status-btn .emoji{font-size:20px;}
.status-btn.on{outline:2.5px solid var(--main); background:var(--main-l);}
.btn{padding:11px 16px;border-radius:12px;font-weight:700;font-size:13.5px;}
.btn-main{background:var(--main);color:#fff;}
.btn-ghost{background:var(--bg);color:var(--text);border:1px solid var(--line);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-block{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;}
.row{display:flex;gap:8px;}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;}
.subject-chip{display:flex;align-items:center;gap:8px;padding:12px;border-radius:12px;border:1.5px solid var(--line);font-weight:700;font-size:13px;}
.subject-dot{width:11px;height:11px;border-radius:4px;flex-shrink:0;}
.timer-num{font-size:52px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:-.01em;margin:18px 0 6px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.bar-track{flex:1;height:9px;background:var(--bg);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;}
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,16,.55);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.modal-overlay.center{align-items:center;padding:16px;}
.modal-sheet{width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;padding:20px 18px 26px;max-height:86vh;overflow-y:auto;animation:slideUp .18s ease;}
.modal-sheet.center-box{border-radius:18px;max-width:400px;}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-weight:800;font-size:15.5px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:12px 2px;border-bottom:1px solid var(--line);font-size:13px;}
.list-item:last-child{border-bottom:none;}
.notice-badge{width:7px;height:7px;border-radius:50%;background:var(--danger);display:inline-block;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1b2320;color:#fff;padding:11px 18px;border-radius:99px;font-size:12.5px;font-weight:600;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:toastIn .2s ease;white-space:nowrap;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
.sleep-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#1b2440,#0b1226);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:24px;}
.sleep-overlay.alarm{animation:flash 1s infinite;}
@keyframes flash{0%,100%{background:linear-gradient(160deg,#1b2440,#0b1226)}50%{background:linear-gradient(160deg,#7a2020,#3a0d0d)}}
.sleep-count{font-size:64px;font-weight:800;font-variant-numeric:tabular-nums;margin:22px 0;}

/* ---------- ADMIN ---------- */
.admin-shell{display:flex;min-height:100vh;}
.side{width:220px;background:#0d211c;color:#dfe8e4;flex-shrink:0;display:flex;flex-direction:column;padding:18px 12px;}
.side-brand{display:flex;align-items:center;gap:9px;padding:6px 8px 20px;}
.side-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;font-size:13px;font-weight:600;color:#a9bab3;margin-bottom:2px;}
.side-item.active{background:var(--main);color:#fff;}
.side-item:hover:not(.active){background:rgba(255,255,255,.06);}
.main-area{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg);}
.admin-top{background:#fff;border-bottom:1px solid var(--line);padding:14px 26px;display:flex;justify-content:space-between;align-items:center;}
.admin-title{font-weight:800;font-size:18px;}
.admin-body{padding:22px 26px;overflow-y:auto;}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;}
.kpi-num{font-size:24px;font-weight:800;}
.kpi-label{font-size:12px;color:var(--sub);margin-top:3px;}
.seat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px;}
.seat-card{background:#fff;border-radius:14px;padding:13px;border:1.5px solid var(--line);border-left:5px solid var(--off);cursor:pointer;transition:.12s;}
.seat-card:hover{box-shadow:0 6px 18px rgba(0,0,0,.08);transform:translateY(-1px);}
.seat-num{font-size:11px;color:var(--sub);font-weight:700;}
.seat-name{font-weight:800;font-size:14.5px;margin:2px 0 6px;}
.seat-status-line{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;margin-bottom:5px;}
.seat-dot{width:8px;height:8px;border-radius:50%;}
.seat-sub{font-size:11.5px;color:var(--sub);}
.table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--line);}
.table th{text-align:left;font-size:11.5px;color:var(--sub);font-weight:700;background:#fafbfa;padding:11px 14px;border-bottom:1px solid var(--line);}
.table td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line);}
.table tr:last-child td{border-bottom:none;}
.chip-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;display:inline-block;}
.panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;}
.tabbar{display:flex;gap:6px;margin-bottom:16px;background:#fff;padding:5px;border-radius:12px;border:1px solid var(--line);width:fit-content;}
.tabbar button{padding:8px 16px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--sub);}
.tabbar button.active{background:var(--main);color:#fff;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:700;margin-bottom:5px;color:var(--sub);}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;}
.alert-card{background:#fff;border:1px solid var(--line);border-left:5px solid var(--off);border-radius:12px;padding:13px 15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.detail-cam{aspect-ratio:4/3;background:#111;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#666;font-size:12.5px;position:relative;overflow:hidden;}
@media(max-width:900px){.admin-shell{flex-direction:column;}.side{width:100%;flex-direction:row;overflow-x:auto;padding:10px;}.side-brand{display:none}.side-item{white-space:nowrap;flex-shrink:0;}.kpi-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

<script>

function fmtHMS(sec){
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  return [h,m,s].map(v=>String(v).padStart(2,'0')).join(':');
}
function fmtMS(sec){
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function fmtClock(ts){
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

/* ---------------- TICKER ---------------- */
setInterval(()=>{
  const st = state.student;
  if(!st) return;
  // study time accrual
  if(!st._paused && STATUS_META[st.status] && STATUS_META[st.status].pure){
    if(!(st.pomodoro.active && st.pomodoro.phase==='break')){
      st.todaySeconds += 1;
      st.subjectSeconds[st.currentSubject] = (st.subjectSeconds[st.currentSubject]||0) + 1;
    }
  }
  // pomodoro
  if(st.pomodoro.active){
    st.pomodoro.remain -= 1;
    if(st.pomodoro.remain <= 0){
      if(st.pomodoro.phase==='focus'){
        st.pomodoro.phase='break'; st.pomodoro.remain = st.pomodoro.breakMin*60;
        toast('⏰ 집중 종료! '+st.pomodoro.breakMin+'분 휴식하세요');
      } else {
        st.pomodoro.phase='focus'; st.pomodoro.remain = st.pomodoro.focusMin*60;
        toast('🔔 휴식 종료! 다시 집중할 시간입니다');
      }
    }
  }
  // sleep countdown
  if(st.sleep.active){
    const remain = st.sleep.endAt - Date.now();
    if(remain <= 0){
      st.sleep.overtimeSec += 1;
      if(st.sleep.overtimeSec>=60 && !st.sleep.alerted){
        st.sleep.alerted = true;
        state.alerts.unshift({id:uid(), seatId:st.seat, name:st.name, type:'SLEEP_OVER', label:'[경고] 수면시간 초과', ts:Date.now(), status:'신규'});
      }
    }
  }
  if(document.getElementById('root')) render(true);
}, 1000);

function render(tick){
  const root = document.getElementById('root');
  if(!state.role){ root.innerHTML = LoginScreen(); return; }
  if(state.role==='student') root.innerHTML = StudentApp();
  if(state.role==='admin') root.innerHTML = AdminApp();
  if(state.role==='parent') root.innerHTML = ParentApp();
  if(state.modal) root.innerHTML += renderModal();
  if(state.toast) root.innerHTML += `<div class="toast">${state.toast}</div>`;
  if(!tick) window.scrollTo(0,0);
}

function AlertRow(a){
  const seatBadgeColor = a.status==='신규'?'var(--danger)':a.status==='확인 중'?'var(--warn)':'var(--ok)';
  return `<div class="list-item" style="cursor:pointer;" onclick="openSeatDetail('${a.seatId}')">
    <span>${a.label} <span class="small muted">· ${a.name} (${a.seatId})</span></span>
    <span class="small" style="color:${seatBadgeColor};font-weight:700;">${a.status} · ${timeAgo(a.ts)}</span>
  </div>`;
}
function timeAgo(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return s+'초 전';
  if(s<3600) return Math.floor(s/60)+'분 전';
  return Math.floor(s/3600)+'시간 전';
}

function SeatCard(s){
  const col = seatColor(s);
  const meta = STATUS_META[s.status];
  const elapsed = Math.floor((Date.now()-s.statusStart)/1000);
  return `
  <div class="seat-card" style="border-left-color:${col}" onclick="openSeatDetail('${s.id}')">
    <div class="seat-num">${s.id}${s.bound?' · 나':''}</div>
    <div class="seat-name">${s.name}</div>
    <div class="seat-status-line" style="color:${col}"><span class="seat-dot" style="background:${col}"></span>${meta.label}${s.subject?' · '+s.subject:''}</div>
    <div class="seat-sub">지속 ${fmtHMS(elapsed)}</div>

  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);">
    <div class="kpi"><div class="kpi-num">6.1h</div><div class="kpi-label">센터 평균 일 순공시간</div></div>
    <div class="kpi"><div class="kpi-num">92%</div><div class="kpi-label">평균 출석률</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--danger)">14</div><div class="kpi-label">이번 주 AI 경고 누적</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--warn)">3</div><div class="kpi-label">수면 초과 발생</div></div>
  </div>
  <div class="panel">
    <div class="card-title">학생별 오늘 순공시간</div>
    ${seats.map(s=>{
      const dummy = s.bound ? Math.round(state.student.todaySeconds/60) : 60+Math.floor(Math.random()*180);
      const pct = Math.min(100, Math.round(dummy/420*100));
      return `<div class="bar-row"><span class="small" style="width:70px;font-weight:700;">${s.name}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--main)"></div></div><span class="small muted" style="width:60px;text-align:right;">${Math.floor(dummy/60)}h ${dummy%60}m</span></div>`;
    }).join('')}
  </div>`;
}

function AdminAlerts(){
  const filter = state._alertFilter || '전체';
  const list = filter==='전체' ? state.alerts : state.alerts.filter(a=>a.status===filter);
  return `
  <div class="tabbar">
    ${['전체','신규','확인 중','조치 완료','오탐 처리'].map(f=>`<button class="${filter===f?'active':''}" onclick="state._alertFilter='${f}';render()">${f}</button>`).join('')}
  </div>
  <div class="panel" style="margin-bottom:16px;">
    <div class="card-title">테스트용 AI 이벤트 시뮬레이션</div>
    <div class="row" style="flex-wrap:wrap;gap:8px;">
      ${['DROWSINESS','PHONE_USAGE','ABSENCE','CAMERA_DISCONNECTED'].map(t=>{
        const labels = {DROWSINESS:'졸음 감지',PHONE_USAGE:'휴대폰 감지',ABSENCE:'자리비움',CAMERA_DISCONNECTED:'카메라 끊김'};
        return `<button class="btn btn-ghost small" onclick="simulateAdminAIEvent('A-01','${t}')">A-01 ${labels[t]} 발생</button>`;
      }).join('')}
    </div>
  </div>
  ${list.length? list.map(a=>`
    <div class="alert-card" style="border-left-color:${a.status==='신규'?'var(--danger)':a.status==='확인 중'?'var(--warn)':a.status==='조치 완료'?'var(--ok)':'var(--off)'}">
      <div>
        <b>${a.label}</b>
        <div class="small muted" style="margin-top:4px;">${a.name} · ${a.seatId} · ${new Date(a.ts).toLocaleString('ko-KR')} · ${timeAgo(a.ts)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <select onchange="updateAlertStatus('${a.id}', this.value)" style="font-size:11.5px;padding:6px 8px;border-radius:8px;border:1px solid var(--line);margin-bottom:6px;">
          ${['신규','확인 중','조치 완료','오탐 처리'].map(s=>`<option ${a.status===s?'selected':''}>${s}</option>`).join('')}
        </select><br>
        <button class="btn btn-ghost small" style="padding:5px 10px;" onclick="openSeatDetail('${a.seatId}')">좌석 보기</button>
      </div>
    </div>`).join('') : '<div class="small muted">해당하는 알림이 없습니다</div>'}
  `;
}

function AdminPayments(){
  const st = state.student;
  return `
  <div class="panel">
    <div class="card-title">결제 관리 (데모: ${st.name} 학생 기준)</div>
    <table class="table">
      <thead><tr><th>이용권명</th><th>금액</th><th>기한</th><th>상태</th><th>결제일</th><th></th></tr></thead>
      <tbody>
      ${st.payments.map(p=>`
        <tr>
          <td><b>${p.name}</b></td><td>${p.amount.toLocaleString()}원</td>
          <td>${new Date(p.due).toLocaleDateString('ko-KR')}</td>
          <td><span class="chip-status" style="background:${p.status==='PAID'?'#e5f4ea':p.status==='OVERDUE'?'#fdeaea':'#fdf3e2'};color:${p.status==='PAID'?'var(--ok)':p.status==='OVERDUE'?'var(--danger)':'var(--warn)'}">${paymentLabel(p.status)}</span></td>
          <td>${p.paidAt? new Date(p.paidAt).toLocaleDateString('ko-KR'):'-'}</td>
          <td>
            <select onchange="updatePaymentStatus('${p.id}', this.value)" style="font-size:11.5px;padding:5px 7px;border-radius:8px;border:1px solid var(--line);">
              ${['SCHEDULED','REQUESTED','PAID','OVERDUE','PARTIAL','REFUNDED'].map(s=>`<option value="${s}" ${p.status===s?'selected':''}>${paymentLabel(s)}</option>`).join('')}
            </select>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
    <button class="btn btn-main" style="margin-top:14px;" onclick="toast('새 결제 링크가 발행되었습니다 (데모)')">+ 결제 링크 발행</button>
  </div>`;
}

function AdminNotice(){
  const sub = state.adminTablesTab.notice;
  return `
  <div class="tabbar">
    <button class="${sub==='notice'?'active':''}" onclick="state.adminTablesTab.notice='notice';render()">공지사항</button>
    <button class="${sub==='task'?'active':''}" onclick="state.adminTablesTab.notice='task';render()">과제관리</button>
  </div>
  ${sub==='notice' ? `
  <div class="panel" style="margin-bottom:16px;">
    <div class="card-title">새 공지 작성</div>
    <div class="field"><label>제목</label><input id="ntTitle" placeholder="공지 제목을 입력하세요"></div>
    <div class="field"><label>대상</label><select id="ntTarget"><option>전체</option><option>고3반</option><option>개별 학생</option></select></div>
    <button class="btn btn-main" onclick="addNoticeAdmin(document.getElementById('ntTitle').value, document.getElementById('ntTarget').value)">공지 등록</button>
  </div>
  <div class="panel">
    <div class="card-title">등록된 공지</div>
    ${state.noticesAdmin.map(n=>`<div class="list-item"><span><b>${n.title}</b> <span class="small muted">· ${n.target}</span></span><span class="small muted">${timeAgo(n.ts)}</span></div>`).join('')}
  </div>` : `
  <div class="panel">
    <div class="card-title">학생별 과제 현황 (${state.student.name})</div>
    ${state.student.assignments.map(a=>`
      <div class="list-item"><span>${a.title} <span class="small muted">(${a.subject})</span></span>
      <span class="small" style="color:${a.submitted?'var(--ok)':'var(--danger)'};font-weight:700;">${a.submitted?'제출완료':'미제출'}</span></div>`).join('')}
  </div>`}
  `;
}

function AdminConsult(){
  return `
  <div class="panel" style="margin-bottom:16px;">
    <div class="card-title">상담 기록 작성</div>
    <div class="row">
      <div class="field" style="flex:1;"><label>학생</label><select id="csStudent">${state.adminStudents.map(s=>`<option>${s.name}</option>`).join('')}</select></div>
      <div class="field" style="flex:1;"><label>유형</label><select id="csType"><option>학습</option><option>생활</option><option>학부모</option></select></div>
    </div>
    <div class="field"><label>상담 내용</label><textarea id="csContent" rows="2" placeholder="상담 내용을 입력하세요"></textarea></div>
    <div class="field"><label>조치 사항</label><input id="csAction" placeholder="조치 사항을 입력하세요"></div>
    <button class="btn btn-main" onclick="addConsultation(document.getElementById('csStudent').value,document.getElementById('csType').value,document.getElementById('csContent').value,document.getElementById('csAction').value)">저장</button>
  </div>
  <div class="panel">
    <div class="card-title">상담 이력</div>
    ${state.consultations.map(c=>`
      <div class="list-item" style="display:block;">
        <div class="row" style="justify-content:space-between;"><b>${c.student} · ${c.type}상담</b><span class="small muted">${new Date(c.date).toLocaleDateString('ko-KR')}</span></div>
        <div class="small muted" style="margin-top:4px;">${c.content}</div>
        <div class="small" style="margin-top:2px;color:var(--main);">조치: ${c.action}</div>
      </div>`).join('')}
  </div>`;
}

function AdminSettings(){
  return `
  <div class="panel" style="margin-bottom:16px;">
    <div class="card-title">AI 감지 민감도</div>
    <div class="field"><label>졸음 감지 임계 시간 (초)</label><input type="range" min="2" max="10" value="5"></div>
    <div class="field"><label>딴짓/휴대폰 경고 발생 시간 (초)</label><input type="range" min="10" max="60" value="30"></div>
    <div class="field"><label>자리비움 경고 발생 시간 (분)</label><input type="range" min="1" max="5" value="1"></div>
  </div>
  <div class="panel" style="margin-bottom:16px;">
    <div class="card-title">과목 및 색상 설정</div>
    ${SUBJECTS.map(s=>`<div class="list-item"><span class="subject-chip" style="border:none;padding:0;"><span class="subject-dot" style="background:${s.color}"></span>${s.name}</span><input type="color" value="${s.color}" style="width:34px;height:26px;border:none;background:none;"></div>`).join('')}
  </div>
  <div class="panel">
    <div class="card-title">스냅샷 보관 정책</div>
    <div class="field"><label>보관 기간</label><select><option>7일</option><option selected>14일</option><option>30일</option></select></div>
    <div class="small muted">보관기간 종료 후 자동 삭제되며, 관리자 권한 계정만 열람할 수 있습니다.</div>
  </div>`;
}

/* ---------------- MODALS ---------------- */
function renderModal(){
  const m = state.modal;
  if(!m) return '';
  if(m.type==='subject') return SubjectModal();
  if(m.type==='pomodoro') return PomodoroModal();
  if(m.type==='sleep') return SleepPickerModal();
  if(m.type==='seatDetail') return SeatDetailModal(m.id);
  return '';
}
function SubjectModal(){
  return `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-title">과목 선택<span onclick="closeModal()" style="cursor:pointer;color:var(--sub);">✕</span></div>
      ${SUBJECTS.map(s=>`
        <div class="subject-chip" style="margin-bottom:9px;cursor:pointer;" onclick="pickSubjectAndStart('${s.name}')">
          <span class="subject-dot" style="background:${s.color}"></span>${s.name}
        </div>`).join('')}
    </div>
  </div>`;
}
function PomodoroModal(){
  const presets = [[25,5],[40,10],[50,10]];
  return `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-title">뽀모도로 설정<span onclick="closeModal()" style="cursor:pointer;color:var(--sub);">✕</span></div>
      ${presets.map(([f,b])=>`<button class="btn btn-ghost btn-block" style="margin-bottom:8px;justify-content:space-between;padding:14px 16px;" onclick="startPomodoro(${f},${b})"><span>집중 ${f}분 / 휴식 ${b}분</span><span>▶</span></button>`).join('')}
      <div class="row" style="margin-top:10px;">
        <input id="pmF" type="number" placeholder="집중(분)" value="30" style="flex:1;padding:11px;border:1.5px solid var(--line);border-radius:10px;">
        <input id="pmB" type="number" placeholder="휴식(분)" value="5" style="flex:1;padding:11px;border:1.5px solid var(--line);border-radius:10px;">
      </div>
      <button class="btn btn-main btn-block" style="margin-top:8px;" onclick="startPomodoro(+document.getElementById('pmF').value||25, +document.getElementById('pmB').value||5)">직접 설정으로 시작</button>
    </div>
  </div>`;
}
function SleepPickerModal(){
  return `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-title">수면 시간 선택<span onclick="closeModal()" style="cursor:pointer;color:var(--sub);">✕</span></div>
      <div class="small muted" style="margin-bottom:14px;">파워냅은 최대 20분까지만 설정할 수 있습니다</div>
      <div class="row">
        ${[10,15,20].map(m=>`<button class="btn btn-ghost btn-block" style="padding:20px 0;flex-direction:column;font-size:20px;" onclick="startSleep(${m})">${m}<span class="small" style="font-weight:400;">분</span></button>`).join('')}
      </div>
    </div>
  </div>`;
}
function SeatDetailModal(id){
  const s = getSeat(id);
  if(!s) return '';
  const meta = STATUS_META[s.status];
  const elapsed = Math.floor((Date.now()-s.statusStart)/1000);
  const relatedAlerts = state.alerts.filter(a=>a.seatId===id).slice(0,5);
  const subjSecs = s.bound ? state.student.subjectSeconds : null;
  return `
  <div class="modal-overlay center" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet center-box" style="max-width:460px;">
      <div class="modal-title">${s.id} · ${s.name}${s.bound?' (본인)':''}<span onclick="closeModal()" style="cursor:pointer;color:var(--sub);">✕</span></div>
      <div class="detail-cam">
        ${s.camera ? `<div style="text-align:center;"><div style="font-size:30px;">📷</div><div class="small" style="margin-top:6px;">${s.aiStatus}</div></div>` : `<div style="text-align:center;color:#999;"><div style="font-size:26px;">🚫</div><div class="small" style="margin-top:6px;">카메라 연결 끊김</div></div>`}
      </div>
      <div class="row" style="margin:12px 0;flex-wrap:wrap;gap:6px;">
        <span class="tag" style="background:${meta.color}22;color:${meta.color}">${meta.emoji} ${meta.label}</span>
        ${s.subject?`<span class="tag" style="background:${subjColor(s.subject)}22;color:${subjColor(s.subject)}">${s.subject}</span>`:''}
        <span class="tag" style="background:#eee;color:#555">지속 ${fmtHMS(elapsed)}</span>
      </div>
      ${subjSecs?`<div class="small muted" style="margin-bottom:10px;">오늘 순공시간: <b style="color:var(--text)">${fmtHMS(state.student.todaySeconds)}</b></div>`:''}
      <div class="card-title" style="margin-top:14px;">최근 AI 경고</div>
      ${relatedAlerts.length? relatedAlerts.map(a=>`<div class="list-item"><span>${a.label}</span><span class="small muted">${timeAgo(a.ts)}</span></div>`).join('') : '<div class="small muted">최근 경고 없음</div>'}

      <div class="card-title" style="margin-top:14px;">관리자 메모</div>
      <textarea rows="2" placeholder="메모를 입력하세요" style="width:100%;padding:9px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;margin-bottom:14px;">${s.memo||''}</textarea>

      <div class="card-title">관리자 조작</div>
      <div class="row" style="flex-wrap:wrap;gap:8px;margin-bottom:8px;">
        <button class="btn btn-ghost small" onclick="sendWarningToStudent('${s.id}')">⚠️ 경고 알림 보내기</button>
        <button class="btn btn-ghost small" onclick="forceEndTimer('${s.id}')">⏹ 타이머 강제 종료</button>
        <button class="btn btn-ghost small" onclick="requestCameraReconnect('${s.id}')">📡 카메라 재연결 요청</button>
      </div>
      <select onchange="forceStatusChange('${s.id}', this.value)" style="width:100%;padding:10px;border:1.5px solid var(--line);border-radius:9px;margin-bottom:8px;">
        <option value="">상태 강제 변경...</option>
        ${Object.entries(STATUS_META).map(([k,v])=>`<option value="${k}">${v.emoji} ${v.label}</option>`).join('')}
      </select>
      <div class="small muted" style="margin-bottom:6px;">AI 이벤트 시뮬레이션</div>
      <div class="row" style="flex-wrap:wrap;gap:6px;">
        <button class="btn btn-ghost small" onclick="simulateAdminAIEvent('${s.id}','DROWSINESS')">졸음</button>
        <button class="btn btn-ghost small" onclick="simulateAdminAIEvent('${s.id}','PHONE_USAGE')">휴대폰</button>
        <button class="btn btn-ghost small" onclick="simulateAdminAIEvent('${s.id}','ABSENCE')">자리비움</button>
        <button class="btn btn-ghost small" onclick="simulateAdminAIEvent('${s.id}','CAMERA_DISCONNECTED')">카메라끊김</button>
      </div>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
